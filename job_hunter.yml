# ═══════════════════════════════════════
# Job Hunter — GitHub Actions Workflow
# ═══════════════════════════════════════
# Runs the job hunting pipeline on weekday mornings at 07:00 CET.
#
# Design decisions:
# - Cron runs at 05:00 UTC (= 07:00 CET / 07:00 CEST adjusts to 06:00 UTC in summer,
#   but GitHub cron doesn't support timezones — 05:00 UTC is close enough year-round).
# - The workflow commits updated seen_jobs.json back to the repo
#   so deduplication state persists across runs.
# - Manual trigger (workflow_dispatch) enables testing without waiting for cron.

name: Job Hunter — Daily Job Match

on:
  schedule:
    # Weekdays at 05:00 UTC ≈ 07:00 CET
    - cron: "0 5 * * 1"

  workflow_dispatch:
    # Allows manual triggering from GitHub Actions UI

permissions:
  contents: write  # Needed to commit seen_jobs.json updates

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout repo ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works
          fetch-depth: 0

      # ── Setup Python ──
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Install dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run the pipeline ──
      - name: Run Job Hunter pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python main.py

      # ── Commit updated seen_jobs.json ──
      - name: Commit deduplication state
        run: |
          git config user.name "Job Hunter Bot"
          git config user.email "bot@job-hunter.local"
          git add data/seen_jobs.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update seen_jobs.json [skip ci]"
          git push
